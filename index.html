<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Album Designing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #111424;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            text-align: center;
        }

        .section-label {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .btn-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .size-btn {
            background-color: #22263f;
            color: #ffffff;
            border: 2px solid #2a2f45;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .size-btn.highlight {
            background-color: #ffc107;
            color: #111424;
            border-color: #ffc107;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            color: #ffc107;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .gallery-title {
            font-size: 1.8rem;
            color: #ffc107;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1300px;
            width: 100%;
        }

        .design-card {
            background-color: #1a1d2e;
            border: 1px solid #2a2f45;
            border-radius: 8px;
            padding: 15px;
            width: 380px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .design-card img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            margin-bottom: 12px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .design-card h3 {
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .design-card p {
            color: #ffc107;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h2 class="section-label">Select Album Size</h2>
    
    <div class="btn-grid">
        <a href="#" class="size-btn">13×39</a>
        <a href="#" class="size-btn highlight">12×36</a>
        <a href="#" class="size-btn">18×24</a>
        <a href="#" class="size-btn">17×24</a>
        <a href="#" class="size-btn">16×24</a>
        <a href="#" class="size-btn">15×24</a>
    </div>

    <div class="social-links">
        <a href="#" class="social-btn">💬 WhatsApp</a>
        <a href="#" class="social-btn">📸 Instagram</a>
    </div>

    <h2 class="gallery-title">Wedding — 12x36 Designs</h2>

    <div class="gallery-container">
        <!-- 1 -->
        <div class="design-card">
            <img src="images/wedding/12x36/1.jpg" alt="wedding Design 1">
            <h3>wedding Design 1</h3>
            <p>Size: 12x36</p>
        </div>
        <!-- 2 -->
        <div class="design-card">
            <img src="images/wedding/12x36/2.jpg" alt="wedding Design 2">
            <h3>wedding Design 2</h3>
            <p>Size: 12x36</p>
        </div>
        <!-- 8 -->
        <div class="design-card">
            <img src="images/wedding/12x36/8.jpg" alt="wedding Design 8">
            <h3>wedding Design 8</h3>
            <p>Size: 12x36</p>
        </div>
        <!-- 11 -->
        <div class="design-card">
            <img src="images/wedding/12x36/11.jpg" alt="wedding Design 11">
            <h3>wedding Design 11</h3>
            <p>Size: 12x36</p>
        </div>
        <!-- 3 -->
        <div class="design-card">
            <img src="images/wedding/12x36/3.jpg" alt="wedding Design 3">
            <h3>wedding Design 3</h3>
            <p>Size: 12x36</p>
        </div>
        <!-- 4 -->
        <div class="design-card">
            <img src="images/wedding/12x36/4.jpg" alt="wedding Design 4">
            <h3>wedding Design 4</h3>
            <p>Size: 12x36</p>
        </div>
    </div>

    <!-- బ్యాక్‌గ్రౌండ్‌లో ప్రొటెక్షన్ రన్ చేసే స్క్రిప్ట్ -->
    <script src="script.js"></script>
</body>
</html>
